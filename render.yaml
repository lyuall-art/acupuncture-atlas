services:
  - type: web
    name: acupuncture-atlas
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ACTIVE_PROVIDER
        value: nvidia
      - key: NVIDIA_MODEL
        value: google/gemma-4-31b-it
      - key: PYTHON_VERSION
        value: 3.12
